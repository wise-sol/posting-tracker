<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Posting Tracker</title>

<!-- Leaflet.js -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<!-- エリアデータ -->
<script src="areas_data.js"></script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #070b14;
    --surface: #0d1420;
    --border: #1a2a4a;
    --cyan: #00e5ff;
    --green: #7fff00;
    --pink: #ff3f8e;
    --yellow: #ffd600;
    --muted: #4a6080;
    --text: #e8f0fe;
    --font: 'DM Mono', 'Courier New', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    overflow: hidden;
  }

  /* ========== LAYOUT ========== */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  /* ========== HEADER ========== */
  #header {
    flex-shrink: 0;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 1000;
  }
  #logo { font-size: 12px; letter-spacing: 3px; color: var(--cyan); font-weight: bold; }
  #rec-badge {
    display: none;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--pink);
    font-weight: bold;
  }
  #rec-badge.visible { display: flex; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--pink);
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* ========== MAP ========== */
  #map-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #map {
    width: 100%;
    height: 100%;
    background: #0a1020;
  }

  /* Leaflet dark override */
  .leaflet-tile { filter: brightness(0.85) saturate(0.7) hue-rotate(200deg); }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--cyan) !important;
    border-color: var(--border) !important;
    font-family: var(--font) !important;
  }
  .leaflet-control-attribution {
    background: #0a0f1aaa !important;
    color: var(--muted) !important;
    font-size: 9px !important;
  }

  /* ========== FLOATING PANEL ========== */
  #float-panel {
    position: absolute;
    top: 10px; left: 10px;
    z-index: 900;
    display: flex;
    flex-direction: column;
    gap: 6px;
    pointer-events: none;
  }
  .fp-card {
    background: #0d1420ee;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    pointer-events: all;
    backdrop-filter: blur(6px);
  }

  /* ========== STATS OVERLAY ========== */
  #stats-overlay {
    position: absolute;
    top: 10px; right: 10px;
    z-index: 900;
    background: #0d1420ee;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    backdrop-filter: blur(6px);
    display: none;
    min-width: 120px;
  }
  #stats-overlay.visible { display: block; }
  .stat-row { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 4px; }
  .stat-val { font-size: 18px; font-weight: bold; color: var(--cyan); }
  .stat-val.green { color: var(--green); }
  .stat-val.pink { color: var(--pink); }
  .stat-lbl { font-size: 9px; color: var(--muted); letter-spacing: 1px; }
  #accuracy-line { font-size: 10px; color: var(--muted); margin-top: 6px; }

  /* ========== BOTTOM SHEET ========== */
  #bottom-sheet {
    flex-shrink: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom, 16px));
    z-index: 1000;
  }

  /* タブ */
  #tab-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 4px;
    margin-bottom: 12px;
  }
  .tab-btn {
    padding: 8px 4px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: var(--font);
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all .2s;
    text-align: center;
  }
  .tab-btn.active {
    border-color: var(--cyan);
    color: var(--cyan);
    background: #00e5ff11;
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ========== BUTTONS ========== */
  .btn {
    width: 100%;
    padding: 14px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 8px;
    cursor: pointer;
    transition: all .2s;
    margin-bottom: 8px;
  }
  .btn-cyan { background: none; border: 2px solid var(--cyan); color: var(--cyan); box-shadow: 0 0 16px #00e5ff22; }
  .btn-pink { background: #ff3f8e22; border: 2px solid var(--pink); color: var(--pink); box-shadow: 0 0 20px #ff3f8e33; }
  .btn-muted { background: none; border: 1px solid var(--border); color: var(--muted); }
  .btn-sm {
    padding: 8px 14px;
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 1px;
    border-radius: 6px;
    cursor: pointer;
    background: none;
    transition: all .2s;
  }
  .btn-sm-cyan { border: 1px solid var(--cyan); color: var(--cyan); }
  .btn-sm-green { border: 1px solid var(--green); color: var(--green); }
  .btn-sm-pink { border: 1px solid var(--pink); color: var(--pink); }
  .btn-sm-muted { border: 1px solid var(--border); color: var(--muted); }

  /* ========== TRACK LIST ========== */
  #track-list { max-height: 180px; overflow-y: auto; }
  .track-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: border-color .2s;
    gap: 8px;
  }
  .track-item:hover { border-color: var(--cyan); }
  .track-item.selected { border-color: var(--cyan); background: #00e5ff08; }
  .track-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .track-info { flex: 1; min-width: 0; }
  .track-name { font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-meta { font-size: 10px; color: var(--muted); }
  .track-actions { display: flex; gap: 4px; flex-shrink: 0; }

  /* ========== AREA / FILE ========== */
  #area-tab { }
  .file-drop-zone {
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: border-color .2s;
    margin-bottom: 8px;
  }
  .file-drop-zone:hover { border-color: var(--cyan); color: var(--cyan); }
  #area-list { max-height: 140px; overflow-y: auto; }
  .area-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 4px;
    font-size: 11px;
  }
  .area-color-bar { width: 4px; height: 20px; border-radius: 2px; margin-right: 8px; flex-shrink: 0; }

  /* ========== MODAL ========== */
  #modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: #000b;
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #modal-overlay.visible { display: flex; }
  #modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    max-width: 340px;
  }
  #modal-title { font-size: 11px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }
  #modal-meta { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  #modal-input {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    margin-bottom: 12px;
  }
  .modal-btns { display: flex; gap: 8px; }

  /* ========== TOAST ========== */
  #toast {
    position: fixed;
    bottom: 100px; left: 50%; transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 12px;
    color: var(--cyan);
    z-index: 3000;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* ========== 現在地ボタン ========== */
  #locate-btn {
    position: absolute;
    bottom: 16px;
    right: 10px;
    z-index: 900;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #0d1420ee;
    border: 1px solid var(--border);
    color: var(--cyan);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
    box-shadow: 0 2px 12px #00000066;
    transition: border-color .2s, box-shadow .2s;
  }
  #locate-btn:active {
    border-color: var(--cyan);
    box-shadow: 0 0 16px #00e5ff44;
  }
  #locate-btn.locating {
    border-color: var(--cyan);
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 #00e5ff44} 50%{box-shadow:0 0 0 8px #00e5ff00} }
  @keyframes ripple { 0%{transform:scale(1);opacity:0.4} 100%{transform:scale(2.8);opacity:0} }

  /* スクロールバー */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  input[type="file"] { display: none; }
  .area-tooltip {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    font-family: var(--font) !important;
    font-size: 9px !important;
    font-weight: bold !important;
    color: #fff !important;
    text-shadow: 0 0 3px #000, 0 0 3px #000 !important;
    white-space: nowrap !important;
    padding: 0 !important;
  }
  .area-tooltip::before { display: none !important; }
</style>
</head>
<body>
<div id="app">

  <!-- ヘッダー -->
  <div id="header">
    <div id="logo">京都ポスティング GPSシステム</div>
    <div id="rec-badge"><div class="dot"></div> REC</div>
  </div>

  <!-- 地図 -->
  <div id="map-wrap">
    <div id="map"></div>

    <!-- 現在地ボタン -->
    <button id="locate-btn" onclick="goToCurrentLocation()" title="現在地へ">⊙</button>

    <!-- 統計オーバーレイ -->
    <div id="stats-overlay">
      <div class="stat-row">
        <div>
          <div class="stat-val pink" id="stat-time">00:00:00</div>
          <div class="stat-lbl">TIME</div>
        </div>
      </div>
      <div class="stat-row">
        <div>
          <div class="stat-val green" id="stat-dist">0.00</div>
          <div class="stat-lbl">KM</div>
        </div>
        <div>
          <div class="stat-val" id="stat-pts">0</div>
          <div class="stat-lbl">PTS</div>
        </div>
      </div>
      <div id="accuracy-line">GPS: --</div>
    </div>
  </div>

  <!-- ボトムシート -->
  <div id="bottom-sheet">
    <!-- タブ -->
    <div id="tab-bar">
      <button class="tab-btn active" onclick="switchTab('rec')">● 記録</button>
      <button class="tab-btn" onclick="switchTab('tracks')">≡ 履歴</button>
      <button class="tab-btn" onclick="switchTab('area')">⬡ エリア</button>
    </div>

    <!-- 記録タブ -->
    <div id="tab-rec" class="tab-content active">
      <button class="btn btn-cyan" id="start-btn" onclick="startRecording()">▶ 配布開始</button>
      <button class="btn btn-pink" id="stop-btn" onclick="stopRecording()" style="display:none">■ 記録停止</button>
    </div>

    <!-- 履歴タブ -->
    <div id="tab-tracks" class="tab-content">
      <div id="track-list"><div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">記録がありません</div></div>
    </div>

    <!-- エリアタブ -->
    <div id="tab-area" class="tab-content">
      <div class="file-drop-zone" onclick="document.getElementById('geojson-input').click()">
        ＋ GeoJSONファイルを読み込む<br>
        <span style="font-size:10px;margin-top:4px;display:block">エリア境界を地図に表示します</span>
      </div>
      <input type="file" id="geojson-input" accept=".geojson,.json" onchange="loadGeoJSON(event)">
      <div id="area-list"><div style="color:var(--muted);font-size:11px;text-align:center;padding:8px">エリアデータなし</div></div>
      <div style="margin-top:8px;display:flex;gap:6px">
        <button class="btn-sm btn-sm-muted" onclick="clearAreas()" style="flex:1">エリア消去</button>
        <button class="btn-sm btn-sm-cyan" onclick="downloadSampleGeoJSON()" style="flex:1">サンプルDL</button>
      </div>
    </div>
  </div>
</div>

<!-- スタッフ名モーダル -->
<div id="staff-modal-overlay" style="display:none;position:fixed;inset:0;background:#000b;z-index:3000;align-items:center;justify-content:center;padding:20px;">
  <div id="modal-box">
    <div id="modal-title">スタッフ名を入力</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px">配布記録に使用されます</div>
    <input id="staff-name-input" type="text" placeholder="例：山田太郎" style="width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font);font-size:13px;margin-bottom:12px;">
    <button class="btn btn-cyan" style="margin:0;padding:12px" onclick="saveStaffName()">開始する</button>
  </div>
</div>

<!-- 保存モーダル -->
<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-title">SAVE TRACK</div>
    <div id="modal-meta"></div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:6px">スタッフ名</div>
    <div id="modal-staff" style="font-size:13px;color:var(--cyan);margin-bottom:12px;font-weight:bold"></div>
    <input id="modal-input" type="text" placeholder="記録名を入力">
    <div class="modal-btns">
      <button class="btn btn-cyan" style="margin:0;flex:1;padding:12px" onclick="saveTrack()">保存・送信</button>
      <button class="btn btn-muted" style="margin:0;flex:1;padding:12px" onclick="discardTrack()">破棄</button>
    </div>
  </div>
</div>

<!-- トースト -->
<div id="toast"></div>

<script>
// ============================================================
// 定数
// ============================================================
const STORAGE_KEY = "posting_tracks_v2";
const SUPABASE_URL = "https://rqrntyhuxzndvldgneur.supabase.co";
const SUPABASE_KEY = "sb_publishable_Q5bssUhH2uYiAfRL8KawxQ_jdMSSqsv";
const TRACK_COLORS = ["#00e5ff","#ff6b35","#7fff00","#ff3f8e","#ffd600","#b388ff","#00ffcc"];
const AREA_COLORS  = ["#ff9100","#e040fb","#40c4ff","#69f0ae","#ffea00","#ff5252"];

// ============================================================
// 状態
// ============================================================
let map, currentPolyline, currentMarker, liveMarker, liveAccuracyCircle;
let staffName = localStorage.getItem("staff_name") || "";
let recording = false;
let watchId = null, timerId = null;
let startTime = 0, elapsed = 0;
let currentPoints = [];
let tracks = [];
let pendingTrack = null;
let areaLayers = [];
let trackPolylines = {};   // id -> leaflet layer
let selectedTrackId = null;

// ============================================================
// 初期化
// ============================================================
window.addEventListener("load", () => {
  initMap();
  loadTracks();
  renderTrackList();
  // スタッフ名が未設定なら入力モーダルを表示
  if (!staffName) {
    document.getElementById("staff-modal-overlay").style.display = "flex";
  }
});

function initMap() {
  map = L.map("map", {
    center: [35.011636, 135.768029], // 京都市中心
    zoom: 14,
    zoomControl: true,
  });

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(map);

  // 常時現在地追跡
  startLiveLocation();

  // エリアデータが埋め込まれていれば自動読み込み
  if (typeof AREA_GEOJSON !== 'undefined') {
    setTimeout(() => {
      addAreaLayer(AREA_GEOJSON, '京都府全エリア');
      toast('エリアデータを読み込みました');
    }, 500);
  }
}

// ============================================================
// タブ
// ============================================================
function switchTab(id) {
  document.querySelectorAll(".tab-btn").forEach((b, i) => {
    b.classList.toggle("active", ["rec","tracks","area"][i] === id);
  });
  document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
  document.getElementById(`tab-${id}`).classList.add("active");
}

// ============================================================
// 記録
// ============================================================
function startRecording() {
  if (!navigator.geolocation) { toast("GPSが使えません"); return; }
  recording = true;
  currentPoints = [];
  startTime = Date.now();
  elapsed = 0;

  // UI
  document.getElementById("start-btn").style.display = "none";
  document.getElementById("stop-btn").style.display = "block";
  document.getElementById("rec-badge").classList.add("visible");
  document.getElementById("stats-overlay").classList.add("visible");

  // 軌跡ライン
  const color = TRACK_COLORS[tracks.length % TRACK_COLORS.length];
  currentPolyline = L.polyline([], {
    color, weight: 4, opacity: 0.9,
    lineCap: "round", lineJoin: "round"
  }).addTo(map);

  // 現在地マーカー（カスタム）
  const icon = L.divIcon({
    className: "",
    html: `<div style="width:14px;height:14px;background:${color};border:2px solid #fff;border-radius:50%;box-shadow:0 0 8px ${color}"></div>`,
    iconSize: [14, 14], iconAnchor: [7, 7],
  });
  currentMarker = L.marker([35.011636, 135.768029], { icon }).addTo(map);

  // GPS追跡
  watchId = navigator.geolocation.watchPosition(
    onPosition,
    err => toast("GPS: " + err.message),
    { enableHighAccuracy: true, maximumAge: 3000, timeout: 15000 }
  );

  // タイマー
  timerId = setInterval(() => {
    elapsed = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById("stat-time").textContent = formatTime(elapsed);
  }, 1000);

  toast("記録開始しました");
}

function onPosition(pos) {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;
  const acc = Math.round(pos.coords.accuracy);

  currentPoints.push({ lat, lon, ts: pos.timestamp });
  currentPolyline.addLatLng([lat, lon]);
  currentMarker.setLatLng([lat, lon]);
  map.panTo([lat, lon]);

  const dist = calcDistance(currentPoints);
  document.getElementById("stat-dist").textContent = (dist / 1000).toFixed(2);
  document.getElementById("stat-pts").textContent = currentPoints.length;
  document.getElementById("accuracy-line").textContent = `GPS: ±${acc}m`;
}

function stopRecording() {
  if (!recording) return;
  navigator.geolocation.clearWatch(watchId);
  clearInterval(timerId);
  recording = false;

  document.getElementById("start-btn").style.display = "block";
  document.getElementById("stop-btn").style.display = "none";
  document.getElementById("rec-badge").classList.remove("visible");

  if (currentPoints.length < 2) {
    toast("記録が短すぎます");
    if (currentPolyline) map.removeLayer(currentPolyline);
    if (currentMarker)   map.removeLayer(currentMarker);
    document.getElementById("stats-overlay").classList.remove("visible");
    return;
  }

  const dist = calcDistance(currentPoints);
  const color = TRACK_COLORS[tracks.length % TRACK_COLORS.length];

  pendingTrack = {
    id: Date.now(),
    points: currentPoints,
    duration: elapsed,
    distance: dist,
    color,
    date: new Date().toISOString(),
    name: `配布 ${new Date().toLocaleDateString("ja-JP")}`,
  };

  // モーダル
  document.getElementById("modal-meta").textContent =
    `${(dist/1000).toFixed(2)} km ／ ${formatTime(elapsed)}`;
  document.getElementById("modal-input").value = pendingTrack.name;
  document.getElementById("modal-staff").textContent = staffName || "未設定";
  document.getElementById("modal-overlay").classList.add("visible");
  document.getElementById("modal-input").focus();
}

function saveStaffName() {
  const name = document.getElementById("staff-name-input").value.trim();
  if (!name) { alert("スタッフ名を入力してください"); return; }
  staffName = name;
  localStorage.setItem("staff_name", name);
  document.getElementById("staff-modal-overlay").style.display = "none";
  toast("ようこそ " + name + " さん");
}

function saveTrack() {
  if (!pendingTrack) return;
  pendingTrack.name = document.getElementById("modal-input").value || pendingTrack.name;
  pendingTrack.staffName = staffName;
  tracks.unshift(pendingTrack);
  saveTracks();

  // Supabaseに送信
  uploadToSupabase(pendingTrack);

  // 軌跡をそのまま地図に残す
  trackPolylines[pendingTrack.id] = currentPolyline;
  if (currentMarker) map.removeLayer(currentMarker);

  pendingTrack = null;
  document.getElementById("modal-overlay").classList.remove("visible");
  document.getElementById("stats-overlay").classList.remove("visible");
  renderTrackList();
  switchTab("tracks");
  toast("保存・送信しました");
}

async function uploadToSupabase(track) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/tracks`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({
        staff_name: track.staffName || staffName,
        date: track.date,
        distance: Math.round(track.distance),
        duration: track.duration,
        points: JSON.stringify(track.points)
      })
    });
    if (res.ok) {
      toast("サーバーに送信しました ✓");
    } else {
      toast("送信失敗（ローカルには保存済み）");
    }
  } catch(e) {
    toast("送信失敗（オフライン？）");
  }
}

function discardTrack() {
  if (currentPolyline) map.removeLayer(currentPolyline);
  if (currentMarker)   map.removeLayer(currentMarker);
  pendingTrack = null;
  document.getElementById("modal-overlay").classList.remove("visible");
  document.getElementById("stats-overlay").classList.remove("visible");
}

// ============================================================
// 履歴
// ============================================================
function loadTracks() {
  try { tracks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { tracks = []; }

  // 保存済み軌跡を地図に再描画
  tracks.forEach(t => {
    if (t.points && t.points.length >= 2) {
      const pl = L.polyline(t.points.map(p => [p.lat, p.lon]), {
        color: t.color, weight: 3, opacity: 0.7,
      }).addTo(map);
      trackPolylines[t.id] = pl;
    }
  });
}

function saveTracks() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tracks)); }
  catch { toast("保存容量が不足しています"); }
}

function renderTrackList() {
  const el = document.getElementById("track-list");
  if (tracks.length === 0) {
    el.innerHTML = `<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">記録がありません</div>`;
    return;
  }
  el.innerHTML = tracks.map(t => `
    <div class="track-item ${selectedTrackId === t.id ? 'selected' : ''}" onclick="focusTrack(${t.id})">
      <div class="track-color-dot" style="background:${t.color}"></div>
      <div class="track-info">
        <div class="track-name">${t.name}</div>
        <div class="track-meta">${new Date(t.date).toLocaleDateString("ja-JP")} · ${(t.distance/1000).toFixed(2)}km · ${formatTime(t.duration)}</div>
      </div>
      <div class="track-actions">
        <button class="btn-sm btn-sm-cyan" onclick="event.stopPropagation();exportTrack(${t.id},'gpx')">GPX</button>
        <button class="btn-sm btn-sm-green" onclick="event.stopPropagation();exportTrack(${t.id},'csv')">CSV</button>
        <button class="btn-sm btn-sm-pink" onclick="event.stopPropagation();deleteTrack(${t.id})">✕</button>
      </div>
    </div>
  `).join("");
}

function focusTrack(id) {
  selectedTrackId = id;
  renderTrackList();
  const t = tracks.find(t => t.id === id);
  if (!t || !t.points.length) return;
  const bounds = L.latLngBounds(t.points.map(p => [p.lat, p.lon]));
  map.fitBounds(bounds, { padding: [40, 40] });
}

function deleteTrack(id) {
  if (!confirm("この記録を削除しますか？")) return;
  if (trackPolylines[id]) { map.removeLayer(trackPolylines[id]); delete trackPolylines[id]; }
  tracks = tracks.filter(t => t.id !== id);
  if (selectedTrackId === id) selectedTrackId = null;
  saveTracks();
  renderTrackList();
  toast("削除しました");
}

// ============================================================
// エクスポート
// ============================================================
function exportTrack(id, fmt) {
  const t = tracks.find(t => t.id === id);
  if (!t) return;
  let content, mime, ext;
  if (fmt === "gpx") {
    content = toGPX(t); mime = "application/gpx+xml"; ext = "gpx";
  } else {
    content = toCSV(t); mime = "text/csv"; ext = "csv";
  }
  downloadFile(content, `${t.name}.${ext}`, mime);
}

function toGPX(t) {
  const pts = t.points.map(p =>
    `    <trkpt lat="${p.lat}" lon="${p.lon}"><ele>0</ele><time>${new Date(p.ts).toISOString()}</time></trkpt>`
  ).join("\n");
  return `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="PostingTracker">\n  <trk><name>${t.name}</name><trkseg>\n${pts}\n  </trkseg></trk>\n</gpx>`;
}

function toCSV(t) {
  return "latitude,longitude,timestamp\n" +
    t.points.map(p => `${p.lat},${p.lon},${new Date(p.ts).toISOString()}`).join("\n");
}

function downloadFile(content, name, mime) {
  const a = Object.assign(document.createElement("a"), {
    href: URL.createObjectURL(new Blob([content], { type: mime })),
    download: name,
  });
  a.click(); URL.revokeObjectURL(a.href);
}

// ============================================================
// GeoJSON エリア境界
// ============================================================
function loadGeoJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      addAreaLayer(data, file.name);
      toast(`読み込み完了: ${file.name}`);
    } catch {
      toast("GeoJSONの読み込みに失敗しました");
    }
  };
  reader.readAsText(file);
  e.target.value = "";
}

function addAreaLayer(geojson, filename) {
  const colorIdx = areaLayers.length % AREA_COLORS.length;
  const color = AREA_COLORS[colorIdx];

  const layer = L.geoJSON(geojson, {
    style: {
      color, weight: 2, opacity: 0.9,
      fillColor: color, fillOpacity: 0.08,
    },
    onEachFeature: (feature, layer) => {
      const name = feature.properties?.name || feature.properties?.エリア名 || feature.properties?.area || "";
      if (name) layer.bindTooltip(name, { permanent: true, direction: "center", className: "area-tooltip", offset: [0,0] });
    }
  }).addTo(map);

  const info = {
    id: Date.now(),
    name: filename.replace(/\.geojson?$/i, ""),
    color,
    featureCount: geojson.features?.length || 0,
    layer,
  };
  areaLayers.push(info);
  map.fitBounds(layer.getBounds(), { padding: [20, 20] });
  renderAreaList();
}

function clearAreas() {
  areaLayers.forEach(a => map.removeLayer(a.layer));
  areaLayers = [];
  renderAreaList();
  toast("エリアを消去しました");
}

function renderAreaList() {
  const el = document.getElementById("area-list");
  if (areaLayers.length === 0) {
    el.innerHTML = `<div style="color:var(--muted);font-size:11px;text-align:center;padding:8px">エリアデータなし</div>`;
    return;
  }
  el.innerHTML = areaLayers.map(a => `
    <div class="area-item">
      <div class="area-color-bar" style="background:${a.color}"></div>
      <div style="flex:1;font-size:11px">${a.name} <span style="color:var(--muted)">(${a.featureCount}エリア)</span></div>
      <button class="btn-sm btn-sm-pink" onclick="removeArea(${a.id})">✕</button>
    </div>
  `).join("");
}

function removeArea(id) {
  const idx = areaLayers.findIndex(a => a.id === id);
  if (idx < 0) return;
  map.removeLayer(areaLayers[idx].layer);
  areaLayers.splice(idx, 1);
  renderAreaList();
}

// ============================================================
// 常時現在地表示
// ============================================================
function startLiveLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      const acc = pos.coords.accuracy;

      // GPS精度円
      if (liveAccuracyCircle) {
        liveAccuracyCircle.setLatLng([lat, lon]);
        liveAccuracyCircle.setRadius(acc);
      } else {
        liveAccuracyCircle = L.circle([lat, lon], {
          radius: acc,
          color: '#00e5ff',
          fillColor: '#00e5ff',
          fillOpacity: 0.08,
          weight: 1,
          opacity: 0.4,
        }).addTo(map);
      }

      // 現在地マーカー（記録中でない場合のみ表示）
      if (!recording) {
        const html = '<div style="position:relative;width:24px;height:24px">' +
          '<div style="position:absolute;inset:0;border-radius:50%;background:#00e5ff;opacity:0.35;animation:ripple 1.6s infinite ease-out"></div>' +
          '<div style="position:absolute;inset:0;border-radius:50%;background:#00e5ff;opacity:0.2;animation:ripple 1.6s infinite ease-out 0.5s"></div>' +
          '<div style="position:absolute;inset:5px;border-radius:50%;background:#00e5ff;border:2.5px solid #fff;box-shadow:0 0 10px #00e5ff88"></div>' +
          '</div>';
        const icon = L.divIcon({ className: '', html: html, iconSize: [24,24], iconAnchor: [12,12] });
        if (liveMarker) {
          liveMarker.setLatLng([lat, lon]);
          liveMarker.setIcon(icon);
        } else {
          liveMarker = L.marker([lat, lon], { icon: icon, zIndexOffset: 1000 }).addTo(map);
        }
      } else {
        if (liveMarker) { map.removeLayer(liveMarker); liveMarker = null; }
      }
    },
    err => {},
    { enableHighAccuracy: true, maximumAge: 3000, timeout: 15000 }
  );
}

// ============================================================
// 現在地へ移動
// ============================================================
function goToCurrentLocation() {
  if (!navigator.geolocation) { toast("GPSが使えません"); return; }
  const btn = document.getElementById("locate-btn");
  btn.classList.add("locating");
  navigator.geolocation.getCurrentPosition(
    pos => {
      const latlng = [pos.coords.latitude, pos.coords.longitude];
      map.setView(latlng, 17, { animate: true });
      btn.classList.remove("locating");
      toast("現在地に移動しました");
    },
    err => {
      btn.classList.remove("locating");
      toast("現在地を取得できません");
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// ============================================================
// ユーティリティ
// ============================================================
function calcDistance(points) {
  let total = 0;
  for (let i = 1; i < points.length; i++) {
    const R = 6371000;
    const dLat = (points[i].lat - points[i-1].lat) * Math.PI / 180;
    const dLon = (points[i].lon - points[i-1].lon) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
      Math.cos(points[i-1].lat*Math.PI/180) * Math.cos(points[i].lat*Math.PI/180) *
      Math.sin(dLon/2)**2;
    total += R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  return total;
}

function formatTime(s) {
  return [Math.floor(s/3600), Math.floor(s%3600/60), s%60]
    .map(v => v.toString().padStart(2,"0")).join(":");
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2500);
}
