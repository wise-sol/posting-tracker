<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>京都ポスティング 管理ダッシュボード</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #070b14; --surface: #0d1420; --border: #1a2a4a;
    --cyan: #00e5ff; --green: #7fff00; --pink: #ff3f8e;
    --yellow: #ffd600; --orange: #ff9100; --muted: #4a6080; --text: #e8f0fe;
    --font: 'DM Mono', 'Courier New', monospace;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ヘッダー */
  #header {
    flex-shrink: 0; padding: 10px 20px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  #logo { font-size: 12px; letter-spacing: 2px; color: var(--cyan); font-weight: bold; }
  #header-right { display: flex; align-items: center; gap: 10px; }
  #last-updated { font-size: 10px; color: var(--muted); }

  /* メインレイアウト */
  #main { flex: 1; display: flex; overflow: hidden; }

  /* サイドバー */
  #sidebar {
    width: 340px; flex-shrink: 0;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* フィルター */
  #filters { padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .section-title { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .filter-row { display: flex; gap: 6px; margin-bottom: 6px; }
  select, input[type="date"] {
    flex: 1; padding: 6px 8px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text);
    font-family: var(--font); font-size: 11px;
  }
  .filter-actions { display: flex; gap: 5px; }

  /* 統計 */
  #stats-bar {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 1px; background: var(--border);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .stat-box { background: var(--surface); padding: 8px; text-align: center; }
  .stat-box-val { font-size: 18px; font-weight: bold; color: var(--cyan); line-height: 1.2; }
  .stat-box-val.green { color: var(--green); }
  .stat-box-val.yellow { color: var(--yellow); }
  .stat-box-val.orange { color: var(--orange); }
  .stat-box-lbl { font-size: 8px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }

  /* スタッフ集計 */
  #staff-summary {
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    max-height: 120px;
    overflow-y: auto;
  }
  #staff-summary-header {
    padding: 6px 14px;
    font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between;
  }
  .staff-row {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 14px; font-size: 11px;
    border-bottom: 1px solid #0d1420;
    cursor: pointer; transition: background .15s;
  }
  .staff-row:hover { background: #ffffff08; }
  .staff-row.active { background: #00e5ff0a; }
  .staff-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .staff-name { flex: 1; }
  .staff-stat { font-size: 10px; color: var(--muted); }

  /* 記録リスト */
  #track-list { flex: 1; overflow-y: auto; padding: 6px; }
  .track-item {
    padding: 9px 11px; border: 1px solid var(--border);
    border-radius: 5px; margin-bottom: 5px; cursor: pointer;
    transition: border-color .2s;
  }
  .track-item:hover { border-color: var(--cyan); }
  .track-item.active { border-color: var(--cyan); background: #00e5ff06; }
  .track-item-header { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
  .track-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .track-staff { font-size: 12px; font-weight: bold; flex: 1; }
  .track-date { font-size: 10px; color: var(--muted); }
  .track-meta { font-size: 10px; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; }
  .track-badge {
    font-size: 9px; padding: 1px 6px; border-radius: 10px;
    border: 1px solid var(--orange); color: var(--orange);
  }

  /* 地図 */
  #map-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #map { flex: 1; background: #0a1020; }
  .leaflet-tile { filter: brightness(0.85) saturate(0.7) hue-rotate(200deg); }
  .leaflet-control-zoom a { background: var(--surface) !important; color: var(--cyan) !important; border-color: var(--border) !important; }
  .leaflet-control-attribution { background: #0a0f1aaa !important; color: var(--muted) !important; font-size: 9px !important; }

  /* 詳細パネル */
  #detail-panel {
    display: none;
    position: absolute; top: 10px; right: 10px;
    width: 220px;
    background: #0d1420ee;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    z-index: 900;
    backdrop-filter: blur(6px);
  }
  #detail-panel.visible { display: block; }
  #detail-panel-close {
    position: absolute; top: 8px; right: 10px;
    color: var(--muted); cursor: pointer; font-size: 14px;
  }
  #detail-panel-close:hover { color: var(--text); }
  .detail-label { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
  .detail-value { font-size: 14px; font-weight: bold; color: var(--cyan); margin-bottom: 10px; }

  /* ボタン */
  .btn-sm {
    padding: 5px 10px; background: none;
    font-family: var(--font); font-size: 10px;
    letter-spacing: 1px; border-radius: 5px; cursor: pointer;
  }
  .btn-cyan { border: 1px solid var(--cyan); color: var(--cyan); }
  .btn-muted { border: 1px solid var(--border); color: var(--muted); }
  .btn-green { border: 1px solid var(--green); color: var(--green); }

  /* ローディング */
  #loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; font-size: 12px; color: var(--muted); letter-spacing: 2px;
  }

  /* スクロールバー */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* 地図ラッパー（詳細パネルのためrelative） */
  #map-wrap { flex: 1; position: relative; overflow: hidden; }
</style>
</head>
<body>
<div id="loading">データを読み込み中...</div>

<div id="app">
  <div id="header">
    <div id="logo">京都ポスティング｜管理ダッシュボード</div>
    <div id="header-right">
      <span id="last-updated"></span>
      <button class="btn-sm btn-green" onclick="exportCSV()">CSV出力</button>
      <button class="btn-sm btn-cyan" onclick="loadTracks()">↻ 更新</button>
    </div>
  </div>

  <div id="main">
    <!-- サイドバー -->
    <div id="sidebar">
      <!-- フィルター -->
      <div id="filters">
        <div class="section-title">フィルター</div>
        <div class="filter-row">
          <input type="date" id="filter-date-from" onchange="applyFilter()" placeholder="開始日">
          <input type="date" id="filter-date-to" onchange="applyFilter()" placeholder="終了日">
        </div>
        <div class="filter-row">
          <select id="filter-staff" onchange="applyFilter()">
            <option value="">全スタッフ</option>
          </select>
        </div>
        <div class="filter-actions">
          <button class="btn-sm btn-cyan" onclick="showAllTracks()" style="flex:1">全軌跡</button>
          <button class="btn-sm btn-muted" onclick="setToday()" style="flex:1">今日</button>
          <button class="btn-sm btn-muted" onclick="clearFilter()" style="flex:1">リセット</button>
        </div>
      </div>

      <!-- 統計 -->
      <div id="stats-bar">
        <div class="stat-box">
          <div class="stat-box-val" id="stat-count">0</div>
          <div class="stat-box-lbl">記録数</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-val green" id="stat-dist">0.0</div>
          <div class="stat-box-lbl">合計KM</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-val yellow" id="stat-staff">0</div>
          <div class="stat-box-lbl">スタッフ</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-val orange" id="stat-leaflet">-</div>
          <div class="stat-box-lbl">配布枚数</div>
        </div>
      </div>

      <!-- スタッフ集計 -->
      <div id="staff-summary">
        <div id="staff-summary-header">
          <span>スタッフ別集計</span>
          <span id="staff-summary-date"></span>
        </div>
        <div id="staff-rows"></div>
      </div>

      <!-- 記録リスト -->
      <div id="track-list">
        <div style="color:var(--muted);font-size:12px;text-align:center;padding:30px">データを読み込み中...</div>
      </div>
    </div>

    <!-- 地図 -->
    <div id="map-wrap">
      <div id="map"></div>

      <!-- 詳細パネル -->
      <div id="detail-panel">
        <span id="detail-panel-close" onclick="closeDetailPanel()">✕</span>
        <div class="detail-label">スタッフ</div>
        <div class="detail-value" id="dp-staff">-</div>
        <div class="detail-label">日時</div>
        <div class="detail-value" id="dp-date" style="font-size:12px">-</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div>
            <div class="detail-label">距離</div>
            <div class="detail-value" id="dp-dist">-</div>
          </div>
          <div>
            <div class="detail-label">時間</div>
            <div class="detail-value" id="dp-dur">-</div>
          </div>
          <div>
            <div class="detail-label">配布枚数</div>
            <div class="detail-value" id="dp-count" style="color:var(--orange)">-</div>
          </div>
          <div>
            <div class="detail-label">GPS点数</div>
            <div class="detail-value" id="dp-pts" style="font-size:12px">-</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://rqrntyhuxzndvldgneur.supabase.co";
const SUPABASE_KEY = "sb_publishable_Q5bssUhH2uYiAfRL8KawxQ_jdMSSqsv";
const COLORS = ["#00e5ff","#ff6b35","#7fff00","#ff3f8e","#ffd600","#b388ff","#00ffcc","#ff9100","#e040fb","#40c4ff"];

let map, allTracks = [], filteredTracks = [], polylines = {};
let staffColorMap = {};
let activeTrackIdx = null;
let activeStaffFilter = null;

window.addEventListener("load", () => {
  initMap();
  setToday();
  loadTracks();
});

function initMap() {
  map = L.map("map", { center: [35.011636, 135.768029], zoom: 12 });
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(map);
}

// Supabase取得
async function loadTracks() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/tracks?select=*&order=created_at.desc&limit=1000`,
      { headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error();
    allTracks = await res.json();
    document.getElementById("loading").style.display = "none";
    document.getElementById("last-updated").textContent =
      "更新: " + new Date().toLocaleTimeString("ja-JP");
    buildStaffFilter();
    applyFilter();
  } catch(e) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("track-list").innerHTML =
      '<div style="color:var(--pink);font-size:12px;text-align:center;padding:20px">データの取得に失敗しました</div>';
  }
}

function buildStaffFilter() {
  const staffSet = [...new Set(allTracks.map(t => t.staff_name).filter(Boolean))].sort();
  staffSet.forEach((s, i) => { staffColorMap[s] = COLORS[i % COLORS.length]; });
  const select = document.getElementById("filter-staff");
  select.innerHTML = '<option value="">全スタッフ</option>';
  staffSet.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s; opt.textContent = s;
    select.appendChild(opt);
  });
}

function setToday() {
  const today = new Date().toISOString().split("T")[0];
  document.getElementById("filter-date-from").value = today;
  document.getElementById("filter-date-to").value = today;
  applyFilter();
}

function clearFilter() {
  document.getElementById("filter-date-from").value = "";
  document.getElementById("filter-date-to").value = "";
  document.getElementById("filter-staff").value = "";
  activeStaffFilter = null;
  applyFilter();
}

function applyFilter() {
  const dateFrom = document.getElementById("filter-date-from").value;
  const dateTo   = document.getElementById("filter-date-to").value;
  const staff    = document.getElementById("filter-staff").value;
  filteredTracks = allTracks.filter(t => {
    const tDate = t.date ? t.date.split("T")[0] : (t.created_at ? t.created_at.split("T")[0] : "");
    if (dateFrom && tDate < dateFrom) return false;
    if (dateTo   && tDate > dateTo)   return false;
    if (staff && t.staff_name !== staff) return false;
    return true;
  });
  activeTrackIdx = null;
  updateStats();
  renderStaffSummary();
  renderList();
  showAllTracks();
}

function updateStats() {
  const staffSet = new Set(filteredTracks.map(t => t.staff_name).filter(Boolean));
  const totalDist = filteredTracks.reduce((a, t) => a + (t.distance || 0), 0);
  const leafletTracks = filteredTracks.filter(t => t.leaflet_count != null);
  const totalLeaflets = leafletTracks.reduce((a, t) => a + (t.leaflet_count || 0), 0);
  document.getElementById("stat-count").textContent = filteredTracks.length;
  document.getElementById("stat-dist").textContent = (totalDist / 1000).toFixed(1);
  document.getElementById("stat-staff").textContent = staffSet.size;
  document.getElementById("stat-leaflet").textContent = leafletTracks.length > 0
    ? totalLeaflets.toLocaleString() : "-";

  // フィルター日付表示
  const from = document.getElementById("filter-date-from").value;
  const to   = document.getElementById("filter-date-to").value;
  let dateLabel = "";
  if (from === to && from) dateLabel = from;
  else if (from || to) dateLabel = `${from || "…"}〜${to || "…"}`;
  document.getElementById("staff-summary-date").textContent = dateLabel;
}

function renderStaffSummary() {
  const staffMap = {};
  filteredTracks.forEach(t => {
    const s = t.staff_name || "不明";
    if (!staffMap[s]) staffMap[s] = { count: 0, dist: 0, leaflets: 0, hasLeaflet: false };
    staffMap[s].count++;
    staffMap[s].dist += (t.distance || 0);
    if (t.leaflet_count != null) {
      staffMap[s].leaflets += t.leaflet_count;
      staffMap[s].hasLeaflet = true;
    }
  });
  const el = document.getElementById("staff-rows");
  const entries = Object.entries(staffMap).sort((a, b) => b[1].dist - a[1].dist);
  if (entries.length === 0) {
    el.innerHTML = '<div style="color:var(--muted);font-size:11px;text-align:center;padding:8px">データなし</div>';
    return;
  }
  el.innerHTML = entries.map(([name, d]) => {
    const color = staffColorMap[name] || "#888";
    const leafletStr = d.hasLeaflet ? ` · ${d.leaflets.toLocaleString()}枚` : "";
    const isActive = activeStaffFilter === name;
    return `<div class="staff-row ${isActive ? 'active' : ''}" onclick="filterByStaff('${name.replace(/'/g,"\\'")}')">
      <div class="staff-dot" style="background:${color}"></div>
      <span class="staff-name">${name}</span>
      <span class="staff-stat">${d.count}件 · ${(d.dist/1000).toFixed(1)}km${leafletStr}</span>
    </div>`;
  }).join("");
}

function filterByStaff(name) {
  if (activeStaffFilter === name) {
    activeStaffFilter = null;
    document.getElementById("filter-staff").value = "";
  } else {
    activeStaffFilter = name;
    document.getElementById("filter-staff").value = name;
  }
  applyFilter();
}

function renderList() {
  const el = document.getElementById("track-list");
  if (filteredTracks.length === 0) {
    el.innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;padding:30px">記録がありません</div>';
    return;
  }
  el.innerHTML = filteredTracks.map((t, i) => {
    const color = staffColorMap[t.staff_name] || COLORS[i % COLORS.length];
    const dateStr = t.date || t.created_at || "";
    const date = dateStr ? new Date(dateStr).toLocaleDateString("ja-JP", { month: "numeric", day: "numeric" }) : "不明";
    const time = dateStr ? new Date(dateStr).toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" }) : "";
    const dist = t.distance ? (t.distance / 1000).toFixed(2) : "0.00";
    const dur  = t.duration ? formatTime(t.duration) : "--:--";
    const countBadge = t.leaflet_count != null
      ? `<span class="track-badge">${t.leaflet_count.toLocaleString()}枚</span>` : "";
    return `
      <div class="track-item ${activeTrackIdx === i ? 'active' : ''}" onclick="focusTrack(${i})" id="track-item-${i}">
        <div class="track-item-header">
          <div class="track-dot" style="background:${color}"></div>
          <div class="track-staff">${t.staff_name || "不明"}</div>
          <div class="track-date">${date} ${time}</div>
        </div>
        <div class="track-meta">
          <span>${dist}km</span>
          <span>${dur}</span>
          ${countBadge}
        </div>
      </div>`;
  }).join("");
}

function clearMap() {
  Object.values(polylines).forEach(pl => map.removeLayer(pl));
  polylines = {};
}

function showAllTracks() {
  clearMap();
  const bounds = [];
  filteredTracks.forEach((t, i) => {
    if (!t.points) return;
    try {
      const pts = typeof t.points === "string" ? JSON.parse(t.points) : t.points;
      if (pts.length < 2) return;
      const color = staffColorMap[t.staff_name] || COLORS[i % COLORS.length];
      const latlngs = pts.map(p => [p.lat, p.lon]);
      const pl = L.polyline(latlngs, { color, weight: 3, opacity: 0.8 }).addTo(map);
      pl.on("click", () => focusTrack(i));
      polylines[i] = pl;
      bounds.push(...latlngs);
    } catch(e) {}
  });
  if (bounds.length > 0) {
    map.fitBounds(L.latLngBounds(bounds), { padding: [40, 40] });
  }
}

function focusTrack(i) {
  activeTrackIdx = i;

  // リスト更新（アクティブクラス）
  document.querySelectorAll(".track-item").forEach((el, idx) =>
    el.classList.toggle("active", idx === i));
  document.getElementById(`track-item-${i}`)?.scrollIntoView({ behavior: "smooth", block: "nearest" });

  const t = filteredTracks[i];
  if (!t?.points) return;
  try {
    const pts = typeof t.points === "string" ? JSON.parse(t.points) : t.points;
    if (pts.length < 2) return;

    // 他の軌跡を薄く、選択した軌跡を強調
    Object.entries(polylines).forEach(([idx, pl]) => {
      pl.setStyle({ opacity: parseInt(idx) === i ? 1 : 0.15, weight: parseInt(idx) === i ? 5 : 2 });
    });
    const latlngs = pts.map(p => [p.lat, p.lon]);
    map.fitBounds(L.latLngBounds(latlngs), { padding: [60, 60] });

    // 詳細パネル
    showDetailPanel(t, pts.length);
  } catch(e) {}
}

function showDetailPanel(t, ptCount) {
  const dateStr = t.date || t.created_at || "";
  document.getElementById("dp-staff").textContent = t.staff_name || "不明";
  document.getElementById("dp-date").textContent = dateStr
    ? new Date(dateStr).toLocaleString("ja-JP", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" })
    : "不明";
  document.getElementById("dp-dist").textContent = t.distance ? (t.distance / 1000).toFixed(2) + " km" : "-";
  document.getElementById("dp-dur").textContent  = t.duration ? formatTime(t.duration) : "-";
  document.getElementById("dp-count").textContent = t.leaflet_count != null
    ? t.leaflet_count.toLocaleString() + " 枚" : "-";
  document.getElementById("dp-pts").textContent  = ptCount + " 点";
  document.getElementById("detail-panel").classList.add("visible");
}

function closeDetailPanel() {
  document.getElementById("detail-panel").classList.remove("visible");
  // 全軌跡を通常表示に戻す
  Object.values(polylines).forEach(pl => pl.setStyle({ opacity: 0.8, weight: 3 }));
  activeTrackIdx = null;
  document.querySelectorAll(".track-item").forEach(el => el.classList.remove("active"));
}

// CSV出力
function exportCSV() {
  if (filteredTracks.length === 0) { alert("出力データがありません"); return; }
  const rows = [["スタッフ名","日付","距離(m)","時間(秒)","配布枚数","GPS点数"]];
  filteredTracks.forEach(t => {
    const dateStr = t.date || t.created_at || "";
    const date = dateStr ? new Date(dateStr).toLocaleDateString("ja-JP") : "";
    let pts = 0;
    try { pts = (typeof t.points === "string" ? JSON.parse(t.points) : t.points || []).length; } catch(e) {}
    rows.push([
      t.staff_name || "",
      date,
      t.distance || 0,
      t.duration || 0,
      t.leaflet_count ?? "",
      pts
    ]);
  });
  const csv = rows.map(r => r.join(",")).join("\n");
  const a = Object.assign(document.createElement("a"), {
    href: URL.createObjectURL(new Blob(["﻿" + csv], { type: "text/csv" })),
    download: `posting_${new Date().toISOString().split("T")[0]}.csv`,
  });
  a.click(); URL.revokeObjectURL(a.href);
}

function formatTime(s) {
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return h > 0
    ? `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`
    : `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}
